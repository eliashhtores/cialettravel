<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cialet Travel Agency</title>
        <link rel="stylesheet" href="/frontend/css/tailwind.min.css" />
        <link rel="stylesheet" href="/frontend/css/index.css" />
    </head>
    <body class="bg-slate-100 text-slate-900">
        <main class="max-w-6xl mx-auto px-4 py-10">
            <section class="text-center mb-10">
                <h1 class="text-4xl font-bold text-indigo-700">Cialet Travel Agency</h1>
                <p class="mt-3 text-lg">Explore curated destinations and travel packages.</p>
            </section>

            <section class="mb-8">
                <h2 class="text-2xl font-semibold mb-4">Top Destinations</h2>
                <div id="destinations-grid" class="grid md:grid-cols-3 gap-4">
                    <p class="text-slate-400">Loading destinations…</p>
                </div>
            </section>

            <section>
                <h2 class="text-2xl font-semibold mb-4">Popular Packages</h2>
                <div id="packages-grid" class="grid md:grid-cols-3 gap-4">
                    <p class="text-slate-400">Loading packages…</p>
                </div>
            </section>
        </main>

        <script src="/frontend/js/index.js"></script>
    </body>
</html>
