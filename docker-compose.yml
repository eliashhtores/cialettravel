services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cialettravel
      POSTGRES_USER: cialettravel
      POSTGRES_PASSWORD: cialettravel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cialettravel -d cialettravel"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 cialettravel.wsgi:application"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: cialettravel
      POSTGRES_USER: cialettravel
      POSTGRES_PASSWORD: cialettravel
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
